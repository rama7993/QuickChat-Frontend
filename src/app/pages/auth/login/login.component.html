<div class="login auth-page">
  <header class="login__header auth-header">
    <div class="login__logo auth-logo">
      <div class="auth-logo__icon">
        <i class="pi pi-comments"></i>
      </div>
      <h1 class="login__title auth-title">
        Quick<span class="auth-title__accent">Chat</span>
      </h1>
    </div>
    <p class="login__tagline auth-tagline">
      Fast. Secure. Effortless Conversations.
    </p>
  </header>

  <section class="login__box auth-card">
    <div class="login__box-header auth-card-header">
      <h2 class="login__heading auth-heading">Welcome Back</h2>
      <p class="login__subtext auth-subtext">
        Log in to resume your conversations.
      </p>
    </div>

    <form
      [formGroup]="loginForm"
      (ngSubmit)="onSubmit()"
      class="login__form auth-form"
    >
      <div class="login__form-group auth-form-group">
        <label for="email" class="login__label auth-label">
          Email <span class="auth-label--required">*</span>
        </label>
        <input
          type="email"
          id="email"
          class="login__input auth-input"
          formControlName="email"
          placeholder="you@example.com"
          [ngClass]="{ 'ng-invalid ng-touched': isInvalid('email') }"
        />
        <div
          class="login__error auth-error"
          *ngIf="email.touched && email.invalid"
        >
          <small *ngIf="email.errors?.['required']">Email is required</small>
          <small *ngIf="email.errors?.['email']">Invalid email address</small>
        </div>
      </div>

      <div class="login__form-group auth-form-group">
        <label for="password" class="login__label auth-label">
          Password <span class="auth-label--required">*</span>
        </label>
        <div class="login__password-wrapper auth-password-wrapper">
          <input
            [type]="showPassword ? 'text' : 'password'"
            id="password"
            class="login__input auth-input"
            formControlName="password"
            placeholder="Min 8 characters"
            [ngClass]="{ 'ng-invalid ng-touched': isInvalid('password') }"
          />
          <i
            class="pi password-toggle"
            [ngClass]="showPassword ? 'pi-eye-slash' : 'pi-eye'"
            (click)="showPassword = !showPassword"
          ></i>
        </div>
        <div
          class="login__error auth-error"
          *ngIf="password.touched && password.invalid"
        >
          <small *ngIf="password.errors?.['required']"
            >Password is required</small
          >
        </div>
        <div class="login__forgot-password">
          <a [routerLink]="['/forgot-password']" class="auth-link--small"
            >Forgot password?</a
          >
        </div>
      </div>

      <div class="login__actions auth-actions">
        <button
          type="submit"
          class="login__button auth-button"
          [disabled]="isSubmitting"
        >
          <i
            [class]="isSubmitting ? 'pi pi-spin pi-spinner' : 'pi pi-sign-in'"
          ></i>
          {{ isSubmitting ? "Signing In..." : "Sign In" }}
        </button>
      </div>

      <div class="login__actions auth-actions" style="margin-top: 1rem">
        <button
          type="button"
          class="login__button auth-button login__button--guest"
          (click)="loginAsDemo()"
          [disabled]="isSubmitting"
        >
          <i class="pi pi-id-card" style="margin-right: 0.5rem"></i>
          Guest Login
        </button>
      </div>

      <div class="login__signup auth-link">
        Don't have an account?
        <a [routerLink]="['/signup']">Sign Up</a>
      </div>
    </form>

    <div class="login__divider auth-divider">
      <span>or continue with</span>
    </div>

    <div class="login__social auth-social">
      <button
        type="button"
        class="login__social-btn auth-social-button auth-social-button--google"
        (click)="loginWith('google')"
      >
        <svg
          class="google-icon"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 48 48"
          width="20"
          height="20"
        >
          <path
            fill="#FFC107"
            d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"
          />
          <path
            fill="#FF3D00"
            d="m6.306 14.691 6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"
          />
          <path
            fill="#4CAF50"
            d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.91 11.91 0 0 1 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"
          />
          <path
            fill="#1976D2"
            d="M43.611 20.083A19.944 19.944 0 0 1 44 24c0 11.045-8.955 20-20 20-1.259 0-2.487-.116-3.678-.336l4.634-11.135C24.469 32.25 24.234 32.25 24 32.25c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025c-.201.373-.38.759-.538 1.153l14.183-11.398c1.377-.282 2.809-.434 4.283-.434 3.059 0 5.842 1.154 7.961 3.039l5.657-5.657c-.201.373-.38.759-.538 1.153z"
            opacity=".05"
          />
          <path
            fill="#1976D2"
            d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l6.19 5.238C40.966 35.534 44 30.122 44 24c0-1.341-.138-2.65-.389-3.917z"
          />
        </svg>
        Sign in with Google
      </button>
    </div>
  </section>
</div>
